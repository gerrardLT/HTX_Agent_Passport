<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTX Agent Passport — 设计方向探索</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0B0E14;color:#E8ECF4;min-height:100vh;overflow:hidden}
.tabs{display:flex;background:#131720;border-bottom:1px solid rgba(255,255,255,.06);padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:100;height:52px;align-items:center}
.tabs h1{font-size:14px;font-weight:600;margin-right:32px;white-space:nowrap;background:linear-gradient(135deg,#06B6D4,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#64748B;cursor:pointer;transition:all .2s;border:none;background:none;font-family:inherit;margin-right:4px}
.tab:hover{color:#E8ECF4;background:rgba(255,255,255,.04)}
.tab.active{color:#E8ECF4;background:rgba(6,182,212,.12)}
.tab .badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:8px;font-weight:600}
.tab:nth-child(2) .badge{background:rgba(94,106,210,.15);color:#5E6AD2}
.tab:nth-child(3) .badge{background:rgba(59,130,246,.15);color:#60A5FA}
.tab:nth-child(4) .badge{background:rgba(6,182,212,.15);color:#06B6D4}
.info{margin-left:auto;display:flex;align-items:center;gap:16px}
.info span{font-size:11px;color:#475569}
.frame-wrap{position:fixed;top:52px;left:0;right:0;bottom:0}
.frame-wrap iframe{width:100%;height:100%;border:none;display:none}
.frame-wrap iframe.active{display:block}
</style>
</head>
<body>
<div class="tabs">
  <h1>设计方向探索</h1>
  <button class="tab active" onclick="show(0)">版 A <span class="badge">轮盘 · Glassmorphism</span></button>
  <button class="tab" onclick="show(1)">版 B <span class="badge">Linear 参照</span></button>
  <button class="tab" onclick="show(2)">版 C <span class="badge">定制 · 青蓝渐变</span></button>
  <div class="info"><span>← → 键切换版本</span></div>
</div>
<div class="frame-wrap">
  <iframe id="f0" class="active" src="roulette.html"></iframe>
  <iframe id="f1" src="reference-linear.html"></iframe>
  <iframe id="f2" src="designer-custom.html"></iframe>
</div>
<script>
let cur = 0;
function show(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  document.querySelectorAll('iframe').forEach((f,j) => f.classList.toggle('active', j===i));
  cur = i;
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') show((cur+1) % 3);
  if (e.key === 'ArrowLeft') show((cur+2) % 3);
});
</script>
</body>
</html>
