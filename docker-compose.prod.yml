# =============================================================================
# HTX Agent Passport — 生产部署（docker-compose.prod.yml）
#
# 架构：Nginx(80) → Frontend(3000) + Backend(8000) → Neon PostgreSQL（外部托管）
#
# 数据库说明：使用 Neon 托管 PostgreSQL（外部服务），不在本 compose 内运行数据库容器。
#   连接信息通过 .env.prod 中的 DATABASE_URL 注入后端。
#
# 使用方式：
#   1. 在 .env.prod 中填写真实密钥与 DATABASE_URL（Neon 连接串）
#   2. docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#   3. 访问 http://your-server-ip
#
# 停止：docker compose -f docker-compose.prod.yml down
# 查看日志：docker compose -f docker-compose.prod.yml logs -f
# =============================================================================

services:
  # ─── 后端 API（FastAPI + Uvicorn）────────────────────────────────────────
  backend:
    image: ghcr.io/gerrardlt/htx_agent_passport-backend:${IMAGE_TAG:-latest}
    container_name: htx_passport_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      # Neon 托管 PostgreSQL 连接串（含 ?sslmode=require），由 .env.prod 注入
      DATABASE_URL: ${DATABASE_URL}
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY}
      VAULT_KEY_PROVIDER: ${VAULT_KEY_PROVIDER:-local}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: 24
      DEMO_MODE: ${DEMO_MODE:-true}
      DEMO_REAL_TRADE: ${DEMO_REAL_TRADE:-false}
      DEMO_DISABLE_EXECUTION: ${DEMO_DISABLE_EXECUTION:-false}
      GENESIS_HASH: HTX_AGENT_PASSPORT_GENESIS_V1
      AUDIT_STH_ENABLED: 'false'
      BAI_API_KEY: ${BAI_API_KEY:-}
      BAI_API_URL: ${BAI_API_URL:-https://api.b.ai/v1}
      BAI_MODEL: ${BAI_MODEL:-deepseek-v4-flash}
      BAI_TIMEOUT_SECONDS: 30
      BAI_MAX_RETRIES: 2
      HTX_API_URL: ${HTX_API_URL:-https://api.huobi.pro}
      CORS_ORIGINS: '["http://localhost", "http://localhost:80"]'
      VOLCENGINE_TTS_API_KEY: ${VOLCENGINE_TTS_API_KEY:-}
      VOLCENGINE_TTS_VOICE_ID: ${VOLCENGINE_TTS_VOICE_ID:-zh_female_vv_uranus_bigtts}
    networks:
      - internal

  # ─── 前端（Next.js 14 standalone）────────────────────────────────────────
  frontend:
    image: ghcr.io/gerrardlt/htx_agent_passport-frontend:${IMAGE_TAG:-latest}
    container_name: htx_passport_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:3000"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    name: htx_passport_net
