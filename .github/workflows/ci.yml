name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "运行 Playwright E2E 测试"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (next lint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run type-check

      - name: Build (next build)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api

      # 可选 Playwright E2E 步骤（任务 1.4）
      # 启用条件：PR 携带 'e2e' 标签，或手动触发并将 run_e2e 设为 true
      # 未启用时以下步骤跳过，不影响其余门禁
      - name: Install Playwright browsers
        if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.event.inputs.run_e2e == 'true'
        run: npx playwright install --with-deps

      - name: E2E (Playwright)
        if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.event.inputs.run_e2e == 'true'
        run: npx playwright test e2e/
